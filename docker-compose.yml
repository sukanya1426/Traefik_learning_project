# =============================================================================
# Traefik + FastAPI on Hetzner
# =============================================================================
# Prerequisites before first run:
#   1. Copy .env.example to .env and fill in your values
#   2. touch traefik/acme.json && chmod 600 traefik/acme.json
#   3. Your domain's A records must point to this server's IP
#
# Run:  docker compose up -d --build
# Stop: docker compose down
# Logs: docker compose logs -f
# =============================================================================

services:

  # ---------------------------------------------------------------------------
  # TRAEFIK — reverse proxy, TLS termination, Let's Encrypt
  # ---------------------------------------------------------------------------
  traefik:
    image: traefik:v3.6
    container_name: traefik
    restart: unless-stopped
    ports:
      - "80:80"    # HTTP (redirects to HTTPS + ACME challenge)
      - "443:443"  # HTTPS
      # Note: no 8080 — dashboard is served through Traefik itself
    environment:
      # Passed into traefik.yml via ${LETSENCRYPT_EMAIL} substitution
      - LETSENCRYPT_EMAIL=${LETSENCRYPT_EMAIL}
    volumes:
      - ./traefik/traefik.yml:/etc/traefik/traefik.yml:ro   # Static config (read-only)
      - ./traefik/acme.json:/letsencrypt/acme.json           # TLS cert + key storage
      - /var/run/docker.sock:/var/run/docker.sock:ro         # Docker provider
    labels:
      - "traefik.enable=true"

      # --- Traefik Dashboard ---
      # Accessible at https://traefik.YOURDOMAIN.com  (see .env for DOMAIN)
      - "traefik.http.routers.dashboard.rule=Host(`traefik.${DOMAIN}`)"
      - "traefik.http.routers.dashboard.entrypoints=websecure"
      - "traefik.http.routers.dashboard.tls.certresolver=letsencrypt"
      - "traefik.http.routers.dashboard.service=api@internal"
      - "traefik.http.routers.dashboard.middlewares=dashboard-auth"

      # --- Basic Auth for the Dashboard ---
      # Generate the hash:  htpasswd -nB admin | sed 's/\$/\$\$/g'
      # Then replace the value below (keep the $$ escaping for docker-compose)
      - "traefik.http.middlewares.dashboard-auth.basicauth.users=${TRAEFIK_DASHBOARD_AUTH}"
    networks:
      - traefik-net

  # ---------------------------------------------------------------------------
  # FASTAPI — the application
  # ---------------------------------------------------------------------------
  api:
    build: ./app
    container_name: fastapi
    restart: unless-stopped
    # No published ports — traffic comes only through Traefik
    labels:
      - "traefik.enable=true"

      # --- Router: route HTTPS traffic to the FastAPI container ---
      # Accessible at https://api.YOURDOMAIN.com
      - "traefik.http.routers.api.rule=Host(`api.${DOMAIN}`)"
      - "traefik.http.routers.api.entrypoints=websecure"
      - "traefik.http.routers.api.tls.certresolver=letsencrypt"
      - "traefik.http.routers.api.middlewares=api-auth"

      # Tell Traefik which port FastAPI listens on inside the container
      - "traefik.http.services.api.loadbalancer.server.port=8000"

      # --- Basic Auth for the API ---
      # Generate the hash:  htpasswd -nB user | sed 's/\$/\$\$/g'
      # Then replace the value below
      - "traefik.http.middlewares.api-auth.basicauth.users=${API_AUTH}"
    networks:
      - traefik-net

# =============================================================================
# NETWORK — all services share this network so Traefik can reach them
# =============================================================================
networks:
  traefik-net:
    name: traefik-net
